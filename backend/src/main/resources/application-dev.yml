spring:
  # ── Dev Database (MySQL local) ────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/smartcampus_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root

  # ── Hibernate: auto-create tables in dev ──────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ── Dev Mail: MailHog / Mailtrap ──────────────────────────
  mail:
    host: localhost
    port: 1025
    username: ''
    password: ''
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# ── Dev JWT (non-secret placeholder) ─────────────────────────
jwt:
  secret: dev-only-secret-key-do-not-use-in-production-min-256-bits!!
  expiration-ms: 86400000

# ── Dev logging: verbose ──────────────────────────────────────
logging:
  level:
    com.smartcampus: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE

# ── Dev server ────────────────────────────────────────────────
server:
  error:
    include-stacktrace: always
