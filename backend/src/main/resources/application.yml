spring:
  config:
    import: optional:dotenv
  application:
    name: akademi

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:akademi}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect 
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
            redirect-uri: "http://localhost:8081/login/oauth2/code/google"

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000       # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

akademi:
  sla:
    response-hours: 4
    resolve-hours: 24
    escalation-hours: 48
  qr:
    token-expiry-minutes: 15
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}